<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dadabek Tursunov  - Rasmiy Pleyer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --dark: #0f172a; 
            --card: #1e293b; 
            --accent: #10b981; 
            --info: #38bdf8; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; height: 100vh; overflow: hidden; }

        /* 1-SAHIFA: RO'YXAT */
        #playlist-screen { height: 100vh; display: flex; flex-direction: column; background: #020617; }
        .nav-header { 
            background: #020617; padding: 20px; border-bottom: 2px solid var(--card); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-header h2 { font-size: 20px; letter-spacing: 1px; font-weight: 700; }
        .nav-header span { color: var(--info); }

        .list-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 30px; }
        .track-card {
            background: var(--card); margin-bottom: 12px; padding: 16px; border-radius: 15px;
            display: flex; align-items: center; cursor: pointer; border: 1px solid #334155; transition: 0.3s;
        }
        .track-card:hover { border-color: var(--info); transform: translateY(-2px); background: #26334d; }
        .track-number { width: 35px; color: var(--info); font-weight: bold; font-size: 14px; }
        .track-name { font-size: 16px; flex-grow: 1; font-weight: 500; }

        /* 2-SAHIFA: PLEYER OYNASI */
        #player-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: none; flex-direction: column;
            align-items: center; padding: 40px 25px; z-index: 200;
            background: linear-gradient(to bottom, #1e293b 0%, #0f172a 100%);
        }
        .back-btn { align-self: flex-start; font-size: 30px; cursor: pointer; color: var(--info); margin-bottom: 20px; }
        
        .cover-box {
            width: 280px; height: 280px; border-radius: 35px; 
            border: 5px solid var(--card); box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            margin-bottom: 35px; overflow: hidden;
        }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }

        .song-details { text-align: left; width: 100%; margin-bottom: 25px; border-left: 5px solid var(--info); padding-left: 18px; }
        .song-details h2 { font-size: 26px; color: white; margin-bottom: 6px; }
        .song-details p { color: var(--info); font-size: 18px; font-weight: 500; opacity: 0.9; }

        /* Progress Bar (Siz so'ragan aniq funksiya uchun) */
        .progress-area { 
            width: 100%; height: 8px; background: #334155; border-radius: 10px; 
            cursor: pointer; margin-top: 25px; position: relative;
        }
        .progress-bar { 
            height: 100%; background: var(--info); width: 0%; 
            border-radius: 10px; position: relative; pointer-events: none; 
        }
        .progress-bar::after { 
            content: ''; position: absolute; right: -7px; top: -5px; 
            width: 18px; height: 18px; background: white; 
            border: 4px solid var(--info); border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .time-info { display: flex; justify-content: space-between; width: 100%; margin-top: 15px; color: #94a3b8; font-size: 14px; font-family: 'Courier New', Courier, monospace; }

        /* Controls */
        .main-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 45px; }
        .ctrl-icon { font-size: 28px; cursor: pointer; color: #cbd5e1; transition: 0.2s; }
        .ctrl-icon:hover { color: var(--info); }
        
        .play-pause-btn { 
            width: 80px; height: 80px; background: var(--info); color: var(--dark); 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 32px; box-shadow: 0 0 30px rgba(56, 189, 248, 0.5); transition: 0.3s;
        }
        .play-pause-btn:active { transform: scale(0.9); }
        .active-mode { color: var(--accent) !important; text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div id="playlist-screen">
        <div class="nav-header">
            <h2>DADABEK <span>TURSUNOV </span></h2>
            <i class="fas fa-compact-disc fa-spin" style="color: var(--info); font-size: 24px;"></i>
        </div>
        <div class="list-container" id="list-container"></div>
    </div>

    <div id="player-screen">
        <i class="fas fa-chevron-down back-btn" onclick="closePlayer()"></i>
        
        <div class="cover-box">
            <img id="main-cover" src="dadabek.jpg" onerror="this.src='https://via.placeholder.com/300/1e293b/38bdf8?text=Dadabek+Tursunov'">
        </div>

        <div class="song-details">
            <h2 id="main-title">Musiqa nomi</h2>
            <p>Dadabek Tursunov </p>
        </div>

        <div class="progress-area" id="p-area" onclick="seek(event)">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <div class="time-info">
            <span id="curr-time">0:00</span>
            <span id="dur-time">0:00</span>
        </div>

        <div class="main-controls">
            <i class="fas fa-redo-alt ctrl-icon" id="repeat-btn" onclick="toggleRepeat()" title="Takrorlash"></i>
            <i class="fas fa-step-backward ctrl-icon" onclick="prevSong()"></i>
            <div class="play-pause-btn" onclick="togglePlay()">
                <i class="fas fa-play" id="play-btn"></i>
            </div>
            <i class="fas fa-step-forward ctrl-icon" onclick="nextSong()"></i>
            <i class="fas fa-random ctrl-icon" id="shuffle-btn" onclick="toggleShuffle()" title="Tasodifiy"></i>
        </div>
    </div>

    <audio id="audio"></audio>

    <script src="script.js"></script>
</body>
</html>
